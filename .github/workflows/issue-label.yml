name: Auto Label Issues
on:
  issues:
    types: [opened]

permissions:
  issues: write

jobs:
  label:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const title = context.payload.issue.title.toLowerCase();
            const body = (context.payload.issue.body || '').toLowerCase();
            const labels = [];

            if (title.includes('bug') || title.includes('fix') || body.includes('bug')) 
              labels.push('bug');
            if (title.includes('feat') || title.includes('feature') || title.includes('add') || body.includes('feature request')) 
              labels.push('enhancement');
            if (title.includes('docs') || title.includes('readme') || title.includes('contributing')) 
              labels.push('documentation');
            if (title.includes('ui') || title.includes('style') || title.includes('css') || title.includes('dark mode')) 
              labels.push('UI');
            if (title.includes('easy') || body.includes('easy')) 
              labels.push('Easy');
            if (title.includes('medium') || body.includes('medium')) 
              labels.push('Medium');
            if (title.includes('hard') || body.includes('hard')) 
              labels.push('Hard');
            if (body.includes('good first issue') || body.includes('beginner')) 
              labels.push('good first issue');

            if (labels.length > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.issue.number,
                labels
              });
            }
