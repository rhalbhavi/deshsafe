name: Greet New Contributors
on:
  pull_request_target:
    types: [opened]
  issues:
    types: [opened]

permissions:
  issues: write
  pull-requests: write

jobs:
  greet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/first-interaction@v1
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          issue-message: |
            👋 Hey @${{ github.actor }}, thanks for opening your first issue on **DeshSafe**!
            Before we get started:
            - Make sure your issue follows the template
            - Check if a similar issue already exists
            - For SSoC contributors: wait for the issue to be assigned before starting work
            We'll get back to you soon! 🚀
          pr-message: |
            👋 Hey @${{ github.actor }}, thanks for your first PR on **DeshSafe**!
            Please make sure:
            - [ ] A linked issue exists and is mentioned above (`Closes #issue_number`)
            - [ ] You've filled out the PR template completely
            - [ ] Screenshots are included for any UI changes
            Your PR will be reviewed once all the above are done. Thanks for contributing! 🙌
